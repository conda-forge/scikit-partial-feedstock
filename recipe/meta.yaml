{% set name = "scikit-partial" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scikit-partial-{{ version }}.tar.gz
  sha256: 1914c3ca140b4789816087486d3e2b621c1c3920685006c582a69ee58f3a240f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - scikit-learn >=0.24.0

test:
  imports:
    - skpartial
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/koaning/scikit-partial
  license: MIT
  license_file: LICENSE
  summary: Scikit-learn pipeline components that support partial_fit.

extra:
  recipe-maintainers:
    - thewchan
